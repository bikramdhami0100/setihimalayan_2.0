# CodeRabbit Configuration
# Project: Seti Himalayan (Full-Stack Bus Booking System)

reviews:
  profile: assertive
  auto_review:
    enabled: true
    path_filters:
      - "!**/node_modules/**"
      - "!**/dist/**"
      - "!**/package-lock.json"
      - "!**/yarn.lock"
      - "!seti_app/.expo/**"
  tools:
    linters:
      enabled: true
    ast_grep:
      enabled: true

instructions: |
  This is a full-stack project consisting of:
  - Frontend: `seti_app` (React Native/Expo)
  - Backend: `bus-booking-backend` (Node.js/Express)

  System Architecture:
  - The frontend (`seti_app`) communicates with the backend (`bus-booking-backend`) via a REST API.
  - Authentication is handled via JWT tokens generated by the backend and stored in the frontend's SecureStore/AsyncStorage.
  - The two repositories/folders are tightly coupled via API contracts.

  Review Guidelines:
  
  1. Frontend (seti_app):
     - Ensure API calls match the endpoints defined in `bus-booking-backend/routes`.
     - Check for consistent error handling and loading states in the UI.
     - Look for performance optimization in list rendering and context usage.
     
  2. Backend (bus-booking-backend):
     - Verify JWT authentication middleware and input validation.
     - Ensure API responses match the structure expected by the frontend's API services.
     - Check database queries for efficiency (Sequelize/SQL).
     
  3. Integration & Sync:
     - When reviewing changes to API endpoints, verify that both the frontend call and backend handler are updated consistently.
     - Look for potential CORS issues or environmental configuration mismatches.
