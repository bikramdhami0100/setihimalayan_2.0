reviews:
  auto_review: true
  review_on_push: true

  path_filters:
    - "bus-booking-backend/**"
    - "seti_app/**"

  path_instructions:
    - path: "bus-booking-backend/**"
      instructions: |
        This is the backend service.
        Focus on:
        - API correctness
        - database queries
        - authentication & security
        - performance issues
        - error handling

    - path: "seti_app/**"
      instructions: |
        This is the frontend application.
        Focus on:
        - UI logic correctness
        - API integration with backend
        - state management
        - performance and UX issues

  high_level_summary: true
  review_comments: true
  request_changes_workflow: true
  request_review_changes: true
  context:
  - |
    The repository contains two connected applications:
    - bus-booking-backend: provides APIs
    - seti_app: consumes those APIs

    When reviewing:
    - Ensure frontend API calls match backend endpoints
    - Check request/response consistency
    - Flag breaking changes between frontend and backend